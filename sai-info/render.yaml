services:
  - type: web
    name: sai-infotech-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_FAMILY
        value: 4
      - key: SMTP_CONNECTION_TIMEOUT
        value: 10000
      - key: SMTP_GREETING_TIMEOUT
        value: 10000
      - key: SMTP_SOCKET_TIMEOUT
        value: 10000
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: ADMIN_RESET_JWT_SECRET
        sync: false
