    <!-- CRITICAL: Run before any CSS paints — forces light mode even if OS is dark -->
    <script>
      (function() {
        // Always remove dark class immediately — before first paint
        document.documentElement.classList.remove('dark');
        document.documentElement.style.colorScheme = 'light';
        localStorage.setItem('theme', 'light');
      })();
    </script>
